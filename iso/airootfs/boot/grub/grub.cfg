# FluentOS GRUB 引导配置
# /boot/grub/grub.cfg

set timeout=5
set default=0
set gfxmode=auto
set gfxpayload=keep
insmod gfxterm
insmod vbe
insmod video
insmod all_video
insmod font
insmod png
insmod jpeg
insmod part_gpt
insmod part_msdos
insmod ext2
insmod ntfs
insmod search_fs_uuid
insmod search_fs_file
insmod search_label
insmod regexp
insmod echo
insmod test
insmod sleep
insmod linux
insmod echo
insmod gfxterm
insmod gettext
insmod terminal
insmod probe
insmod multiboot
insmod chain
insmod configfile
insmod normal

# 主题
if [ -f /boot/grub/themes/FluentOS/theme.txt ]; then
    set theme=/boot/grub/themes/FluentOS/theme.txt
fi

# 菜单颜色
set menu_color_normal=white/black
set menu_color_highlight=white/blue

# 默认启动项
menuentry "FluentOS (Default)" {
    set root=(hd0,gpt2)
    linux /boot/vmlinuz-linux root=/dev/sda2 rw quiet splash
    initrd /boot/initramfs-linux.img
}

menuentry "FluentOS (Advanced options)" {
    set root=(hd0,gpt2)
    submenu "Fallback" {
        menuentry "FluentOS, with Linux linux-lts" {
            set root=(hd0,gpt2)
            linux /boot/vmlinuz-linux-lts root=/dev/sda2 rw
            initrd /boot/initramfs-linux-lts.img
        }
    }
}

menuentry "Windows Boot Manager" {
    set root=(hd0,gpt1)
    chainloader /EFI/Microsoft/Boot/bootmgfw.efi
}

menuentry "Memory test (memtest86+)" {
    linux16 /boot/memtest86+/memtest.bin
}

menuentry "UEFI Firmware Settings" {
    fwsetup
}

# 从其他分区加载 GRUB
configfile /boot/grub/custom.cfg
