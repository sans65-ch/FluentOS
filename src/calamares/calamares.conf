# FluentOS Calamares 配置文件
# 主配置文件

---
# 全局设置
arch:             auto
dont-chroot:      false
no-prompt:        false

# 目标系统设置
targetRoot:       /
# kernel:         linux
# bootLoader:     grub2

# 步骤配置
steps:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary

# 模块配置
modules:
  - name:           welcome
    interface:      netinstall
    enabled:        false

  - name:           locale
    interface:      netinstall
    enabled:        true

  - name:           keyboard
    interface:      netinstall
    enabled:        true

  - name:           partition
    interface:      netinstall
    enabled:        true

  - name:           users
    interface:      netinstall
    enabled:        true

  - name:           summary
    interface:      netinstall
    enabled:        true

# 包管理配置 (使用 pacman)
package_system:   pacman

# 需要的包
packages:
  - base
  - base-devel
  - linux
  - linux-firmware
  - sudo
  - vim
  - git
  - networkmanager
  - grub
  - os-prober
  - ntfs-3g
  - plasma
  - kde-applications
  - latte-dock
  - dolphin
  - ark
  - spectacle
  - gwenview
  - firefox
  - konsole
  - plasma-wayland-session
  - sddm
  - sddm-kcm

# 脚本配置
scripts:
  - file:          01-mount-windows.sh
    kind:          umount
    source:        root/etc/calamares/scripts/01-mount-windows.sh

  - file:          02-fluentos-firstboot.sh
    kind:          startqt
    source:        root/etc/calamares/scripts/02-fluentos-firstboot.sh

# 完成操作
post-install:
  - file:          10-calamares-systemd.sh
    target:        /etc/systemd/system/multi-user.target.wants/calamares.service
    daemon:        true

# 卸载后操作
post-umount:
  - file:          cleanup.sh
    source:        scripts/cleanup.sh

# 日志配置
logging:           true
logfile:          /var/log/calamares.log
verbosity:        info
